<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite inválido · Topshop Amazon System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-card__brand">
            <div class="auth-card__mark">T</div>
            <div>
                <div class="auth-card__name">Topshop Amazon</div>
                <div class="auth-card__sub">System</div>
            </div>
        </div>

        <div class="alert alert--danger">
            <strong>Link inválido ou expirado.</strong><br>
            Esse convite pode ter sido usado, revogado, ou ter passado da validade (48h).
            Solicite um novo link ao administrador.
        </div>

        <a href="{{ url_for('auth.login') }}" class="btn btn--primary btn--block">Ir para login</a>
    </div>
</body>
</html>
