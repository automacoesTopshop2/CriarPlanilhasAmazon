<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Verificação em duas etapas · Topshop Amazon System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-card__brand">
            <div class="auth-card__mark">T</div>
            <div>
                <div class="auth-card__name">Topshop Amazon</div>
                <div class="auth-card__sub">System</div>
            </div>
        </div>

        <h1 class="auth-card__title">Código de verificação</h1>
        <p class="auth-card__lead">
            Abra o app autenticador (Google Authenticator, Authy, 1Password)
            e digite o código de 6 dígitos.
        </p>

        {% if erro %}
        <div class="alert alert--danger">{{ erro }}</div>
        {% endif %}

        {% if not fatal %}
        <form method="POST" action="{{ url_for('auth.login_verificar_2fa', next=proximo) }}" novalidate>
            {{ form.hidden_tag() }}

            <label class="field">
                <span class="field__label">Código</span>
                {{ form.codigo(
                    class_="field__input",
                    inputmode="numeric",
                    autocomplete="one-time-code",
                    autofocus=True,
                    maxlength="32",
                    placeholder="000000",
                    style="font-family: 'JetBrains Mono', monospace; font-size: 22px; letter-spacing: 6px; text-align: center;"
                ) }}
                <span class="field__hint">
                    Sem acesso ao app? Digite um dos seus códigos de backup
                    (formato <code>XXXX-XXXX-XXXX-XXXX</code>).
                </span>
                {% for e in form.codigo.errors %}<span class="field__error">{{ e }}</span>{% endfor %}
            </label>

            <button type="submit" class="btn btn--primary btn--lg btn--block">Verificar</button>
        </form>
        {% endif %}

        <p class="auth-card__hint">
            <a href="{{ url_for('auth.login') }}">Voltar ao login</a>
        </p>
    </div>
</body>
</html>
